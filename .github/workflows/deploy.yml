name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static files
        run: |
          mkdir dist
          cp -r index.html script.js style.css assets pieces posts dist/ 2>/dev/null || true

      # Upload the build
      - uses: bffless/upload-artifact@v1.1.1
        with:
          path: dist
          api-url: ${{ vars.BFFLESS_URL }}
          api-key: ${{ secrets.BFFLESS_API_KEY }}
          branch: main
          
