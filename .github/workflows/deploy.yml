name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          mkdir -p dist
          cp -r . dist/ || true
          rm -rf dist/.git dist/.github dist/dist node_modules .gitignore .github

      - uses: bffless/upload-artifact@v1.1.1
        with:
          path: ./dist
          api-url: ${{ vars.BFFLESS_URL }}
          api-key: ${{ secrets.BFFLESS_API_KEY }}
          branch: main
